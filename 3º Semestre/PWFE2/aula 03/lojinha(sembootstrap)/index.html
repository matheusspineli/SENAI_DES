<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="style.css">

            </div>

            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8XnXmTcbRwnWxRwyvh3ruyxW0wf2IejqCOw&s" alt="produtos">

        </div>

</html>
